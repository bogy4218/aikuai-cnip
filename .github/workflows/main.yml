name: 每日更新爱快省份IP分组

on:
  schedule:
    # 每天北京时间02:00执行（UTC 18:00）
    - cron: '0 18 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-province-ipgroup:
    runs-on: ubuntu-latest
    steps:
      ##########################################################################
      # 步骤1：拉取仓库代码（完整历史，避免浅克隆问题）
      ##########################################################################
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，确保能正常进行rebase

      ##########################################################################
      # 步骤2：配置Python环境
      ##########################################################################
      - name: 配置Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      ##########################################################################
      # 步骤3：安装依赖库
      ##########################################################################
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      ##########################################################################
      # 步骤4：运行脚本生成IP分组文件
      ##########################################################################
      - name: 执行生成脚本
        run: |
          echo "=== 运行 generate_ip_groups.py 生成文件 ==="
          python generate_ip_groups.py
          
          if [ ! -f "ikuai_cn_province_ipgroup.txt" ]; then
            echo "ERROR: 目标文件 ikuai_cn_province_ipgroup.txt 未生成！"
            ls -l
            exit 1
          fi
          echo "=== 文件生成成功 ==="

      ##########################################################################
      # 步骤5：安全处理代码提交
      ##########################################################################
      - name: 提交并推送更新
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add ikuai_cn_province_ipgroup.txt

          if git diff --cached --quiet; then
            echo "=== 无文件修改，无需提交 ==="
            exit 0
          fi

          git stash
          git pull origin main --rebase
          git stash pop

          git add ikuai_cn_province_ipgroup.txt
          git commit -m "每日自动更新省份IP分组 $(date +'%Y-%m-%d')"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push origin main

      ##########################################################################
      # 步骤6：清理旧工作流记录
      ##########################################################################
      - name: 清理旧工作流记录（保留最近5条）
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          keep_minimum_runs: 5
          workflow_id: "每日更新爱快省份IP分组"
